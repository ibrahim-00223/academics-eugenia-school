# ============================================================
# EUGENIA ACADEMICS — Railway Configuration
# ============================================================

[build]
builder = "NIXPACKS"

[build.buildArgs]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
