# ============================================================
# EUGENIA ACADEMICS — Railway Configuration
# ============================================================

[build]
builder = "NIXPACKS"

[build.buildArgs]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "next start -p ${PORT:-3000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
